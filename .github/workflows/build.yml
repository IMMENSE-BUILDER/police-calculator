name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Accept Android SDK licenses
      run: yes | sdkmanager --licenses || true

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK with full output
      run: ./gradlew assembleDebug --stacktrace --info > build_log.txt 2>&1; echo "EXIT_CODE=$?"; tail -100 build_log.txt
      continue-on-error: true

    - name: Check for errors
      if: always()
      run: |
        echo "=== Build log tail ==="
        tail -50 build_log.txt || true
        echo "=== Looking for compilation errors ==="
        grep -i "error:" build_log.txt || echo "No compilation errors found"
        echo "=== Looking for dependency errors ==="
        grep -i "Could not resolve" build_log.txt || echo "No dependency resolution errors found"

    - name: Upload Build Log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: build_log.txt

    - name: Upload Debug APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: calculator-debug
        path: app/build/outputs/apk/debug/*.apk
